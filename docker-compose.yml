services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Uncomment and fill in to use S3/R2 object storage instead of local disk.
      # When S3_BUCKET is unset, files are stored and served from local disk.
      # - S3_BUCKET=your-bucket-name
      # - S3_REGION=auto
      # - S3_ENDPOINT=https://your-account.r2.cloudflarestorage.com  # omit for AWS S3
      # - S3_ACCESS_KEY_ID=your-access-key
      # - S3_SECRET_ACCESS_KEY=your-secret-key
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BASE_URL: http://localhost:5001
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
